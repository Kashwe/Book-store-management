# Server Configuration
server.port=8080

# Spring Data MongoDB Configuration
# Real credentials go in application-local.properties (gitignored), or set MONGODB_URI as an env var.
spring.profiles.active=local
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/bookstore_db}

# Security & JWT Configuration
# 256-bit secret key for HS256 algorithm
jwt.secret=9a4f2c8d3b7a1e5f8g9h0i1j2k3l4m5n6o7p8q9r0s1t2u3v4w5x6y7z8a9b0c1d
# 1 day expiration in ms (24 * 60 * 60 * 1000)
jwt.expiration=86400000

# Jackson Serialization
spring.jackson.serialization.write-dates-as-timestamps=false

# Swagger UI — accessible at http://localhost:8080/docs
springdoc.swagger-ui.path=/docs
